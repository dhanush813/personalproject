<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icon-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0B3C5D">
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Money — Home Economy</title>
    <style>
        :root {
            /* Editorial — Monocle / FT magazine palette (Polished) */
            --bg: oklch(98% 0.005 95);
            --surface: oklch(100% 0 0);
            --fg: oklch(22% 0.02 75);
            --muted: oklch(55% 0.015 75);
            --border: oklch(92% 0.01 95);
            --accent: oklch(52% 0.12 30); /* Rich terracotta/crimson accent */
            --paper-texture: url("https://www.transparenttextures.com/patterns/natural-paper.png");

            --font-display: 'Iowan Old Style', 'Charter', 'Georgia', serif;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'JetBrains Mono', 'Menlo', monospace;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            background-image: var(--paper-texture);
            color: var(--fg);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .layout {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: left;
            margin-bottom: 3rem;
            border-bottom: 2px solid var(--fg);
            padding-bottom: 1rem;
        }

        .kicker {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            display: block;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2.8rem;
            margin: 0;
            line-height: 0.9;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        input, select {
            border: none;
            border-bottom: 1px solid var(--border);
            background: transparent;
            padding: 0.5rem 0;
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--fg);
            width: 100%;
            transition: border-color 0.3s ease;
            outline: none;
            border-radius: 0;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        .ledger {
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
            position: relative;
        }

        .ledger::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--accent);
        }

        h2 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            margin: 0 0 1.5rem 0;
            font-style: italic;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .row:last-of-type {
            border-bottom: none;
        }

        .label {
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 1rem;
        }

        .value {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .total-box {
            margin-top: 2rem;
            text-align: right;
        }

        .total-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            display: block;
        }

        .total-value {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 700;
            color: var(--fg);
            line-height: 1;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @media (max-width: 400px) {
            .layout { padding: 1rem; }
            h1 { font-size: 2.2rem; }
            .total-value { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <header>
            <span class="kicker">House Economy Vol. I</span>
            <h1>Pocket Money</h1>
        </header>

        <section class="controls">
            <div class="input-group">
                <label for="bonus-level">Multiplier Level</label>
                <input type="number" id="bonus-level" value="0" min="0" max="3">
            </div>
            <div class="input-group">
                <label for="extras">Discretionary</label>
                <input type="number" id="extras" value="0" min="0">
            </div>
            <div class="input-group">
                <label for="month">Period</label>
                <select id="month">
                    <option value="January">January</option><option value="February">February</option>
                    <option value="March">March</option><option value="April">April</option>
                    <option value="May">May</option><option value="June">June</option>
                    <option value="July">July</option><option value="August">August</option>
                    <option value="September">September</option><option value="October">October</option>
                    <option value="November">November</option><option value="December">December</option>
                </select>
            </div>
            <div class="input-group">
                <label for="year">Year</label>
                <input type="number" id="year" value="2026" min="1900" max="2100">
            </div>
        </section>

        <main class="ledger">
            <h2 id="month-year-heading">Statement of Distribution</h2>
            <div id="distribution-list">
                <div class="row"><span class="label">Durga</span><span id="durga-val" class="value"></span></div>
                <div class="row"><span class="label">Hari</span><span id="hari-val" class="value"></span></div>
                <div class="row"><span class="label">Radha</span><span id="radha-val" class="value"></span></div>
                <div class="row"><span class="label">Miscellaneous</span><span id="extra-val" class="value"></span></div>
            </div>

            <div class="total-box">
                <span class="total-label">Grand Total</span>
                <span id="total-val" class="total-value"></span>
            </div>
        </main>

        <footer>&copy; 2026 Home Financial Registry</footer>
    </div>

    <script>
        const rates = {
            0: { Durga: 1200, Hari: 900, Radha: 850 },
            1: { Durga: 1700, Hari: 1085, Radha: 975 },
            2: { Durga: 1850, Hari: 1235, Radha: 1125 },
            3: { Durga: 2000, Hari: 1385, Radha: 1275 }
        };

        const bonusLevelEl = document.getElementById('bonus-level');
        const extrasEl = document.getElementById('extras');
        const monthEl = document.getElementById('month');
        const yearEl = document.getElementById('year');
        const durgaValEl = document.getElementById('durga-val');
        const hariValEl = document.getElementById('hari-val');
        const radhaValEl = document.getElementById('radha-val');
        const extraValEl = document.getElementById('extra-val');
        const totalValEl = document.getElementById('total-val');
        const headingEl = document.getElementById('month-year-heading');

        function formatValue(num) { return num.toLocaleString(); }

        function calculate() {
            const level = parseInt(bonusLevelEl.value) || 0;
            const extras = parseInt(extrasEl.value) || 0;
            headingEl.textContent = `${monthEl.value} ${yearEl.value} Distribution`;
            extraValEl.textContent = formatValue(extras);

            if (rates[level]) {
                const { Durga, Hari, Radha } = rates[level];
                durgaValEl.textContent = formatValue(Durga);
                hariValEl.textContent = formatValue(Hari);
                radhaValEl.textContent = formatValue(Radha);
                totalValEl.textContent = formatValue(Durga + Hari + Radha + extras);
            } else {
                [durgaValEl, hariValEl, radhaValEl, extraValEl, totalValEl].forEach(el => el.textContent = '—');
            }
        }

        [bonusLevelEl, extrasEl, monthEl, yearEl].forEach(el => el.addEventListener('input', calculate));
        calculate();
    </script>
</body>
</html>
